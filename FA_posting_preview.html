<div id="preview" class="sel-preview-post">

	<!-- Colonne gauche : profil (réutilise les classes CSS du vrai post) -->
	<div class="sel-preview-col-profile">
		<div class="postprofile-name">
			<strong class="sel-preview-uname"></strong>
		</div>
		<span class="sel-online-status"></span>
		<div class="postprofile-avatar sel-preview-avatar"></div>
		<div class="sel-post-rank sel-preview-rank">—</div>
		<div class="sel-preview-data-hint">Contenu du profil</div>
	</div>

	<!-- Colonne droite -->
	<div class="sel-preview-col-right">

		<!-- Ligne rang + boutons d'action -->
		<div class="sel-preview-toprow">
			<div class="sel-preview-rank-bar">Espace éventuel pour un rang</div>
			<div class="sel-preview-action-btns">
				<span class="sel-preview-action-btn">Envoyer un message</span>
				<span class="sel-preview-action-btn">Voir la fiche</span>
				<span class="sel-preview-action-btn">Voir les relations</span>
			</div>
		</div>

		<!-- Méta : numéro + date -->
		<div class="sel-preview-meta">
			<span class="sel-preview-postnum">#0</span>
			<span class="sel-preview-sep">|</span>
			<span class="sel-preview-postdate">date et heure du post</span>
		</div>

		<!-- Corps du message -->
		<div class="sel-preview-content">
			{MESSAGE_NEW}
		</div>

		<!-- Ligne réactions mock -->
		<div class="sel-preview-likes">♥ Espace pour les réactions</div>

	</div>
</div>
