<div class="sel-widget-label">Derniers messages</div>
<div class="sel-lastpost-list" id="sel-lp-list">

  <!-- BEGIN classical_row -->
  <!-- BEGIN recent_topic_row -->
  <div class="sel-lastpost-row">
    <div class="sel-lp-info">
      <div class="sel-lp-title">
        <a href="{classical_row.recent_topic_row.U_TITLE}">{classical_row.recent_topic_row.L_TITLE}</a>
      </div>
      <div class="sel-lp-author">
        <!-- BEGIN switch_poster -->
        <a href="{classical_row.recent_topic_row.switch_poster.U_POSTER}">{classical_row.recent_topic_row.switch_poster.S_POSTER}</a>
        <!-- END switch_poster -->
        <!-- BEGIN switch_poster_guest -->
        {classical_row.recent_topic_row.switch_poster_guest.S_POSTER}
        <!-- END switch_poster_guest -->
      </div>
    </div>
    <div class="sel-lp-date">{classical_row.recent_topic_row.S_POSTTIME}</div>
  </div>
  <!-- END recent_topic_row -->
  <!-- END classical_row -->

</div>
<script type="text/javascript">
//<![CDATA[
function selFmtDates() {
  var MNUMS = ['jan','fev','mar','avr','mai','juin','juil','ao','sep','oct','nov','dec'];
  var els = document.querySelectorAll('#sel-lp-list .sel-lp-date');
  for (var i = 0; i < els.length; i++) {
    var raw = els[i].textContent.trim();
    var lo = raw.toLowerCase();
    var out = '';
    if (lo.indexOf('aujourd') !== -1) {
      var mt = raw.match(/(\d{1,2}):(\d{2})/);
      if (mt) out = mt[1] + 'h' + mt[2];
    } else if (lo.indexOf('hier') !== -1) {
      out = 'hier';
    } else {
      var md = raw.match(/(\d{1,2})\s+([A-Za-zà-ÿ]+)/);
      if (md) {
        var jour = md[1];
        var mword = md[2].toLowerCase();
        var numMois = 0;
        for (var j = 0; j < MNUMS.length; j++) {
          if (mword.indexOf(MNUMS[j]) === 0) {
            numMois = j + 1;
            break;
          }
        }
        if (numMois > 0) {
          out = (jour.length < 2 ? '0' : '') + jour + '/' + (numMois < 10 ? '0' : '') + numMois;
        }
      }
    }
    if (out) els[i].textContent = out;
  }
}
selFmtDates();
//]]>
</script>
