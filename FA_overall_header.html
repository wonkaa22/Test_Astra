<!-- ═══════════════════════════════════════
     NAVBAR SELENUJO
     ═══════════════════════════════════════ -->
<div id="sel-navbar">
  <div class="forum-width sel-navbar-inner">

    <!-- Gauche : pilule thème + Switcheroo -->
    <div class="sel-nav-pill">
      <button class="sel-theme-btn" id="selThemeBtn" type="button" aria-label="Changer de thème">&#127769;</button>
      <div class="sel-nav-sep" id="selNavSep" style="display:none;"></div>
      <nav id="switcheroo" class="switcheroo" direction="horizontal" position="static" style="display:none;"></nav>
    </div>

    <!-- Droite : nav FA stylée directement en pills -->
    <div id="sel-fa-nav">{GENERATED_NAV_BAR}</div>

  </div>
</div>

<script type="text/javascript">
//<![CDATA[
// Toggle thème sombre / clair
(function() {
  var btn  = document.getElementById('selThemeBtn');
  var root = document.documentElement;
  var KEY  = 'sel-theme';

  function applyTheme(theme) {
    if (theme === 'light') {
      root.className = (root.className + ' light').replace(/\s+/g, ' ').trim();
      btn.innerHTML = '&#9728;&#65039;';
    } else {
      root.className = root.className.replace(/\blight\b/g, '').trim();
      btn.innerHTML = '&#127769;';
    }
  }

  applyTheme(localStorage.getItem(KEY) || 'dark');

  btn.onclick = function() {
    var next = root.className.indexOf('light') !== -1 ? 'dark' : 'light';
    localStorage.setItem(KEY, next);
    applyTheme(next);
  };
})();

// Filtrer la nav FA : garder seulement les liens utiles
(function() {
  var nav = document.getElementById('sel-fa-nav');
  if (!nav) return;
  var keep = ['accueil', 'rechercher', 'membres', 's\'enregistrer', 'connexion', 'déconnexion', 'profil', 'admin'];
  nav.querySelectorAll('a').forEach(function(a) {
    var text = a.textContent.trim().toLowerCase();
    var ok = keep.some(function(k) { return text.indexOf(k) !== -1; });
    if (!ok) a.style.display = 'none';
  });
})();
(function() {
  if (typeof _userdata !== 'undefined' && _userdata['session_logged_in']) {
    document.getElementById('selNavSep').style.display = '';
    document.getElementById('switcheroo').style.display = '';
  }
})();
//]]>
</script>
