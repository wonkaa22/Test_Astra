  <!-- Thème : pré-application + fonction toggle -->
  <script type="text/javascript">
    //<![CDATA[
    if (localStorage.getItem('sel-theme') === 'light') {
      document.documentElement.classList.add('light');
    }
    function selToggle(btn) {
      var r = document.documentElement;
      var light = r.classList.contains('light');
      if (light) { r.classList.remove('light'); btn.innerHTML = '&#127769;'; localStorage.setItem('sel-theme','dark'); }
      else { r.classList.add('light'); btn.innerHTML = '&#9728;'; localStorage.setItem('sel-theme','light'); }
    }
    //]]>
  </script>

<body id="modernbb">

<!-- NOTIFFI -->
<!-- BEGIN switch_user_logged_in -->
<!-- Bouton pour ouvrir le panneau des notifications -->
<div id="notiffi_button">
    <span class="ntf_button-text" aria-label="Notifications">&#128276;</span>
    <template class="unread_count" type="template/potion" data-name="unread_notifs">[count]</template>
</div>

<!-- Panneau des notifications -->
<div id="notiffi_panel">
  <!-- Conteneur des actions -->
    <div class="notiffi_manage">
      <!-- Lien vers la page de gestion des notifications dans le profil -->
        <a class="notiffi_see_all" href="/profile?mode=editprofile&page_profil=notifications">Voir toutes les notifications</a>

        <!-- Bouton d'action -->
        <div class="notiffi_actions">
            <button id="notiffi_mark_as_read">Marquer comme lu</button>
            <button id="notiffi_delete_all">Tout supprimer</button>
        </div>
    </div>
    <!-- Fin du couteur des actions -->

    <!-- Conteneur des notifications -->
    <template class="all_notifications" type="template/potion" data-name="all_notifs">

      <!-- Panneau si vide de notification -->
      [isEmpty]
          <span class="no_notification">[text]</span>
      [/isEmpty]

      <!-- Notification -->
      [notifs]
      <div class="notification [type] [read]" data-notif-id="[id]">
          <button @click="deleteNotif" class="notif_close">&times;</button>
          <div class="notif_details">
            <div class="notif_avatar">[avatar]</div>
            <div class="notif_icon">[icon]</div>
          </div>
          <div class="notif_content">
              <div class="notif_text">[text]</div>
              <div class="notif_time">[time]</div>
          </div>
      </div>
      [/notifs]

    </template>
    <!-- Fin du conteneur des notifications -->
</div>
<!-- Fin du panneau des notifications -->

<!-- Popup d'alerte d'une nouvelle notification -->
<template type="template/potion" data-name="alert_notif">
  <div class="notification alert [alert.type]">
          <div class="notif_details">
            <div class="notif_avatar">[alert.avatar]</div>
          </div>
          <div class="notif_content">
              <div class="notif_text">[alert.text]</div>
          </div>
          <button id="alert_dismiss" class="alert_close"><i class="bi bi-x"></i></button>
      </div>
</template>
<!-- Fin du popup -->
<!-- END switch_user_logged_in -->
<!-- NOTIFFIN -->

<!-- BEGIN inactive_users_modal -->
<div id="inactive_popup" style="z-index:10000 !important;">
  <div class="h3">{inactive_users_modal.L_MODAL_TITLE}</div>
  <div id="inactive_popup_message">{inactive_users_modal.L_MODAL_BODY}</div>
  <div id="inactive_popup_buttons">
    <button id="inactive_popup_url" class="button1">{inactive_users_modal.L_MODAL_BUTTON}</button>
    <button id="inactive_popup_close" class="button1">{inactive_users_modal.L_CLOSE}</button>
  </div>
</div>
<script type="text/javascript">
  $('#inactive_popup #inactive_popup_close').on('mouseup', function() {
    document.cookie = "modal_require_activation_closed=1; max-age=86400*15; path=/;";
    $('#inactive_popup').hide(50);
  });
  $('#inactive_popup #inactive_popup_url').on('mouseup', function() {
    document.cookie = "modal_require_activation_closed=1; max-age=86400*15; path=/;";
    location.href = '{inactive_users_modal.U_MODAL}';
  });
</script>
<!-- END inactive_users_modal -->

     NAVBAR SELENUJO
     ═══════════════════════════════════════ -->
<div id="sel-navbar">
  <div class="forum-width sel-navbar-inner">

    <!-- Gauche : pilule thème + Switcheroo -->
    <div class="sel-nav-pill">
      <button class="sel-theme-btn" id="selThemeBtn" type="button" aria-label="Changer de thème" onclick="selToggle(this)">&#127769;</button>
      <div class="sel-nav-sep" id="selNavSep" style="display:none;"></div>
      <nav id="switcheroo" class="switcheroo" direction="horizontal" position="static" style="display:none;"></nav>
    </div>

    <!-- Droite : nav FA stylée directement en pills -->
    <div id="sel-fa-nav">
      {GENERATED_NAV_BAR}
      <li id="sel-notif-li"><a href="/profile?mode=editprofile&amp;page_profil=notifications">Notifications</a></li>
    </div>

  </div>
</div>

<script type="text/javascript">
//<![CDATA[


(function() {
  var loggedIn = !!document.querySelector('#sel-fa-nav a[href*="logout"]');
  var notifLi = document.getElementById('sel-notif-li');
  if (loggedIn) {
    document.getElementById('selNavSep').style.display = '';
    document.getElementById('switcheroo').style.display = '';
    var notifBtn = document.getElementById('notiffi_button');
    var notifPanel = document.getElementById('notiffi_panel');
    if (notifLi && notifBtn && notifPanel) {
      notifLi.innerHTML = '';
      notifBtn.appendChild(notifPanel);
      notifLi.appendChild(notifBtn);
      var notifTrigger = notifBtn.querySelector('.ntf_button-text') || notifBtn;
      notifTrigger.addEventListener('click', function(e) {
        e.stopPropagation();
        notifPanel.classList.toggle('is-open');
      });
      document.addEventListener('click', function(e) {
        if (!notifBtn.contains(e.target)) {
          notifPanel.classList.remove('is-open');
        }
      });
    }
  } else {
    if (notifLi) { notifLi.remove(); }
  }
})();
//]]>
</script>
