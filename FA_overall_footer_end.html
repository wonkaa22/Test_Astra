<!-- Page Valero (viewforum) : messages au-dessus des sous-forums + largeur uniforme -->
<script>
function selViewforumTransform() {
  var catBlock  = document.querySelector('.cat-block');
  var forumbgs  = document.querySelectorAll('.forumbg');
  var topicsBox = forumbgs.length ? forumbgs[forumbgs.length - 1] : null;

  if (!catBlock || !topicsBox) return; // pas une page viewforum, on ne touche à rien

  // 1. Place les messages (sujets) au-dessus des sous-forums
  if (topicsBox.parentNode) {
    topicsBox.parentNode.insertBefore(catBlock, topicsBox.nextSibling);
  }

  // 2. Aligne tout sur la même largeur que la navbar (.forum-width = 1050px)
  var widthTargets = document.querySelectorAll(
    '.cat-block, .forumbg, .sub-header, #page-desc, .topic-actions, .pagination, form[name="jumpbox"]'
  );
  widthTargets.forEach(function (el) {
    el.classList.add('forum-width');
  });
}
document.addEventListener('DOMContentLoaded', selViewforumTransform);
</script>
