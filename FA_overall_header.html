<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{FORUM_NAME}</title>
  {META}

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <!-- Scripts ForumActif -->
  {JAVASCRIPT}

  <!-- Thème appliqué avant le rendu pour éviter le flash -->
  <script>
    (function() {
      if (localStorage.getItem('sel-theme') === 'light') {
        document.documentElement.classList.add('light');
      }
    })();
  </script>
</head>

<body>

  <!-- Barre de navigation FA — cachée, requise par Switcheroo -->
  <div style="display:none;">{GENERATED_NAV_BAR}</div>

  <!-- NAVBAR SELENUJO : toggle thème + Switcheroo -->
  <div id="sel-navbar">
    <div class="forum-width">
      <div class="sel-nav-pill">

        <button class="sel-theme-btn" id="selThemeBtn" aria-label="Changer de thème">🌙</button>

        <div class="sel-nav-sep" id="selNavSep" style="display:none;"></div>

        <nav id="switcheroo"
             class="switcheroo"
             direction="horizontal"
             position="static"
             style="display:none;">
        </nav>

      </div>
    </div>
  </div>

  <script>
    // Toggle thème sombre / clair
    (function() {
      var btn  = document.getElementById('selThemeBtn');
      var root = document.documentElement;
      var KEY  = 'sel-theme';

      function applyTheme(theme) {
        if (theme === 'light') {
          root.classList.add('light');
          document.body.classList.add('light');
          btn.textContent = '☀️';
        } else {
          root.classList.remove('light');
          document.body.classList.remove('light');
          btn.textContent = '🌙';
        }
      }

      applyTheme(localStorage.getItem(KEY) || 'dark');

      btn.addEventListener('click', function() {
        var next = document.body.classList.contains('light') ? 'dark' : 'light';
        localStorage.setItem(KEY, next);
        applyTheme(next);
      });
    })();

    // Afficher Switcheroo uniquement si connecté
    (function() {
      if (typeof _userdata !== 'undefined' && _userdata['session_logged_in']) {
        document.getElementById('selNavSep').style.display = '';
        document.getElementById('switcheroo').style.display = '';
      }
    })();
  </script>
