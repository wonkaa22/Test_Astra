  <!-- Switcheroo — scripts et initialisation -->
  <script src="https://cdn.jsdelivr.net/gh/caezd/switcheroo@master/monomer.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/caezd/switcheroo@master/switcheroo.js"></script>
  <script>
    (function() {
      if (typeof _userdata !== 'undefined' && _userdata['session_logged_in']) {
        new Switcheroo('#switcheroo', {
          logo: '',
          enableReorder: true,
          updateAvatar: true,
          confirm: true,
          deleteIcon: '×',
          addIcon: '+',
        }, {
          button: { add: "Associer un personnage" },
          msg: {
            error:   "Une erreur est survenue lors du Switcheroo.",
            confirm: "Confirmer le changement de personnage ?",
          },
          modal: {
            password_label: "Mot de passe",
            username_label: "Nom d'utilisateur",
            login_button:   "Connexion",
          }
        });
      }
    })();

    /* Page Valero (viewforum) : messages au-dessus des sous-forums + largeur uniforme */
    (function selViewforumTransform() {
      var body      = document.body;
      var children  = Array.prototype.slice.call(body.children);
      var catBlock  = children.filter(function (el) { return el.classList.contains('cat-block'); })[0];
      var forumbgs  = children.filter(function (el) { return el.classList.contains('forumbg'); });
      var topicsBox = forumbgs.length ? forumbgs[forumbgs.length - 1] : null;

      console.log('[selViewforum] cat-block:', catBlock, 'forumbg:', topicsBox);

      if (!topicsBox) {
        console.log('[selViewforum] abandon : pas une page viewforum.');
        return;
      }

      var topActions    = document.querySelector('.topic-actions:not(.bottom)');
      var bottomActions = document.querySelector('.topic-actions.bottom');

      var newOrder = children.filter(function (el) { return el !== catBlock; });
      if (catBlock) {
        var insertAfter = (bottomActions && newOrder.indexOf(bottomActions) > -1) ? bottomActions : topicsBox;
        newOrder.splice(newOrder.indexOf(insertAfter) + 1, 0, catBlock);
      }

      body.style.display = 'flex';
      body.style.flexDirection = 'column';
      newOrder.forEach(function (el, i) { el.style.order = i; });

      var widthTargets = document.querySelectorAll('.cat-block, .forumbg, .sub-header, #page-desc, .topic-actions, .pagination, form[name="jumpbox"]');
      widthTargets.forEach(function (el) {
        el.classList.add('forum-width');
      });

      /* Remplace le séparateur "::" du fil d'Ariane par "☽" */
      var pathEl = document.querySelector('.sub-header-path');
      if (pathEl) {
        Array.prototype.forEach.call(pathEl.childNodes, function (node) {
          if (node.nodeType === Node.TEXT_NODE) {
            node.textContent = node.textContent.replace(/::/g, '☽');
          }
        });
      }

      /* Icône lu/non-lu : FA la pose en background-image inline sur dl.icon
         (qui est la ligne entière du sujet), pointant vers un sprite dont on
         ne peut pas réutiliser juste l'URL (mauvais cadrage = icône fichier
         qui apparaissait à tort). On la remplace par une vraie lune, dorée
         si le sujet a des messages non lus (fond topic_unread.png vs
         topic_read.png — le title "Pas de nouveaux messages" contient lui
         aussi "nouveaux", donc pas fiable pour la détection). */
      document.querySelectorAll('ul.topiclist.topics.bg_none dl.icon').forEach(function (dl) {
        var bg    = dl.style.backgroundImage || '';
        var dterm = dl.querySelector('dd.dterm');
        var isUnread = /unread/i.test(bg);
        var badge = document.createElement('span');
        badge.className = 'topic-status-icon' + (isUnread ? ' is-unread' : '');
        badge.textContent = '☽';
        if (dterm) {
          dterm.insertBefore(badge, dterm.firstChild);
        }
      });

      /* Réponses / vues : sortis du cadre titre vers un badge superposé sur
         CE MÊME cadre (et non sur le cadre dernier message), comme les
         pilules "sujets/messages" sur les forums (.forum-stats) */
      document.querySelectorAll('ul.topiclist.topics.bg_none li.row').forEach(function (li) {
        var dl = li.querySelector('dl.icon');
        if (!dl) { return; }
        var dterm = dl.querySelector('dd.dterm');
        var posts = dl.querySelector('dd.posts');
        var views = dl.querySelector('dd.views');
        if (!dterm || (!posts && !views)) { return; }
        var wrap = document.createElement('div');
        wrap.className = 'topic-stats';
        if (views) { wrap.appendChild(views); }
        if (posts) { wrap.appendChild(posts); }
        dterm.appendChild(wrap);
      });

      /* Lien "dernier message" : remplace tout son contenu (flèche, image,
         ou icône "nouveau message" quand le sujet a des messages non lus)
         par une lune fixe, déplacée à droite du cadre (hors du bloc
         nom/date). On cible tous les liens du cadre (hors avatar), pas
         seulement ceux avec un href en "#", au cas où l'icône "nouveau
         message" utilise un autre type de lien ; on n'en garde qu'un seul. */
      document.querySelectorAll('dd.lastpost').forEach(function (dd) {
        var avatar = dd.querySelector('.lastpost-avatar');
        var nameEl = dd.querySelector('strong');
        var anchors = Array.prototype.slice.call(dd.querySelectorAll('a')).filter(function (a) {
          if (avatar && avatar.contains(a)) { return false; }
          if (nameEl && nameEl.contains(a)) { return false; }
          return true;
        });
        if (!anchors.length) { return; }
        var jumpLink = anchors[anchors.length - 1];
        anchors.forEach(function (a) { if (a !== jumpLink) { a.remove(); } });
        jumpLink.textContent = '☽';
        jumpLink.classList.add('lastpost-jump');
        dd.appendChild(jumpLink);
      });

      /* Retire l'icône "vous avez participé" (fichier) à gauche du titre */
      document.querySelectorAll('dd.dterm img').forEach(function (img) {
        img.remove();
      });

      /* Bouton "Rechercher" : remplace l'icône/texte par la lune utilisée
         partout ailleurs, intégrée dans le cadre du champ de recherche */
      document.querySelectorAll('.search-box button').forEach(function (btn) {
        btn.innerHTML = '☽';
      });

      /* Reloge "Poster un nouveau sujet", "Trier" puis "Rechercher", dans cet
         ordre, sur une seule ligne sous la description du forum, à la place
         du lien "marquer comme lu" qui reste disponible une seule fois en
         bas, à droite des sujets */
      var allPaginations = Array.prototype.slice.call(document.querySelectorAll('.pagination'));
      var topPagination    = allPaginations[0];
      var bottomPagination = allPaginations.length > 1 ? allPaginations[allPaginations.length - 1] : null;

      if (topActions) {
        var topBar     = topActions.querySelector('.topic-actions-buttons');
        var subBtns    = document.querySelector('.sub-header-buttons');
        var postBtn    = subBtns ? subBtns.querySelector('a.button1[href*="mode=newtopic"]') : null;
        var searchBox  = subBtns ? subBtns.querySelector('.search-box') : null;
        var sortBox    = bottomActions ? bottomActions.querySelector('#sort-box') : null;
        if (topBar) {
          topBar.innerHTML = '';
          if (postBtn) { topBar.appendChild(postBtn); }
          if (sortBox) { topBar.appendChild(sortBox); }
          if (searchBox) { topBar.appendChild(searchBox); }
          if (topPagination) { topPagination.classList.add('pagination-inline'); topBar.appendChild(topPagination); }
        }
        if (subBtns) { subBtns.remove(); }
      }

      /* Retire le bouton "Poster un nouveau sujet" du bas (déjà présent en
         haut, sous la description) pour éviter le doublon, et replace la
         pagination du bas (si distincte de celle du haut) tout à droite de
         la même ligne que "Surveiller les sujets..." / "Marquer comme lus" */
      if (bottomActions) {
        var bottomPostBtn = bottomActions.querySelector('a.button1[href*="mode=newtopic"]');
        if (bottomPostBtn) { bottomPostBtn.remove(); }
        var bottomBar = bottomActions.querySelector('.topic-actions-buttons');
        if (bottomBar && bottomPagination) {
          bottomPagination.classList.add('pagination-inline');
          bottomBar.appendChild(bottomPagination);
        }
      }

      /* Retire le menu "Plus !" injecté par insert_plus_menu_new (FA) :
         redondant avec les boutons déjà présents */
      document.querySelectorAll('.topic-actions-buttons').forEach(function (bar) {
        Array.prototype.slice.call(bar.children).forEach(function (child) {
          var label = (child.textContent || '').trim();
          if (label === 'Plus !' || child.id === 'plus-link' || child.id === 'plus-menu') {
            child.remove();
          }
        });
      });

      /* Nettoyage du bas de page : texte brut "Utilisateurs parcourant
         actuellement ce forum", bloc modérateurs/permissions (#info_open)
         et légende des icônes (#picture_legend). FA place ces trois
         éléments directement enfants de <body> (pas dans .topic-actions),
         d'où le ciblage via document plutôt que bottomActions. On les
         retire tous, sauf si un invité non connecté n'a pas le droit de
         poster dans ce forum précis : dans ce cas on affiche un seul
         message de négation à la place du bloc permissions. */
      var infoOpen = document.getElementById('info_open');
      var legend   = document.getElementById('picture_legend');

      /* Retire le texte "Utilisateurs parcourant..." et les <a>/<br> qui
         le suivent, flottant directement dans <body> */
      Array.prototype.slice.call(document.body.childNodes).forEach(function (node) {
        if (node.nodeType === Node.TEXT_NODE && /Utilisateurs parcourant/i.test(node.textContent)) {
          var next = node.nextSibling;
          node.remove();
          while (next && (next.nodeName === 'A' || next.nodeName === 'BR' || next.nodeType === Node.TEXT_NODE)) {
            var toRemove = next;
            next = next.nextSibling;
            toRemove.remove();
          }
        }
      });

      if (infoOpen) {
        var isLoggedIn = (typeof _userdata !== 'undefined' && _userdata['session_logged_in']);
        var permsText  = infoOpen.textContent || '';
        var guestCantPost = /ne pouvez pas poster/i.test(permsText);

        if (!isLoggedIn && guestCantPost) {
          var notice = document.createElement('p');
          notice.className = 'forum-guest-notice';
          notice.textContent = "Vous devez être inscrit·e et connecté·e pour poster dans ce forum.";
          infoOpen.parentNode.replaceChild(notice, infoOpen);
        } else {
          infoOpen.remove();
        }
      }

      if (legend) { legend.remove(); }

      console.log('[selViewforum] transform appliquee.');
    })();

    /* Page Sujet (viewtopic) : cadre unique autour des posts, numérotation
       "#1"/"#2", icônes like/dislike en SVG inline (Bootstrap Icons n'est
       pas chargé sur ce site, donc on copie le path plutôt que la classe
       bi-*), masquage de "Poster un nouveau sujet", avatar + compteur de
       mots dans la zone de réponse rapide. */
    (function selViewtopicTransform() {
      var posts = document.querySelectorAll('.post');
      if (!posts.length) { return; }

      document.body.classList.add('sel-viewtopic');

      /* Regroupe tous les .post dans un seul cadre partagé */
      var wrapper = document.createElement('div');
      wrapper.id = 'sel-topic-posts';
      posts[0].parentNode.insertBefore(wrapper, posts[0]);
      posts.forEach(function (p) { wrapper.appendChild(p); });

      /* Numérotation "#1", "#2"... */
      posts.forEach(function (p, i) {
        var dateEl = p.querySelector('.topic-date');
        if (dateEl && !dateEl.querySelector('.sel-post-num')) {
          var num = document.createElement('span');
          num.className = 'sel-post-num';
          num.textContent = '#' + (i + 1);
          dateEl.insertBefore(num, dateEl.firstChild);
        }
      });

      /* Remplace les icônes Ionicons like/dislike par des SVG (Bootstrap Icons : heart / heartbreak) */
      var SVG_LIKE  = '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 14.25C7.79 14.25 7.6 14.18 7.45 14.06C5.96 12.87 4.61 11.76 3.5 10.74C1.62 9.04 0.5 7.38 0.5 5.5C0.5 3.74 1.86 2.38 3.62 2.38C4.7 2.38 5.71 2.92 6.36 3.78L8 5.91L9.64 3.78C10.29 2.92 11.3 2.38 12.38 2.38C14.14 2.38 15.5 3.74 15.5 5.5C15.5 7.38 14.38 9.04 12.5 10.74C11.39 11.76 10.04 12.87 8.55 14.06C8.4 14.18 8.21 14.25 8 14.25Z"/></svg>';
      var SVG_DISLIKE = '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 14.7C7.78 14.7 7.58 14.61 7.43 14.46L1.43 8.46C-0.07 6.96 -0.07 4.54 1.43 3.04C2.93 1.54 5.35 1.54 6.85 3.04L8 4.19L9.15 3.04C10.65 1.54 13.07 1.54 14.57 3.04C16.07 4.54 16.07 6.96 14.57 8.46L8.57 14.46C8.42 14.61 8.21 14.7 8 14.7ZM3 2.5L13 12.5"/><path d="M1 1L15 15" stroke="currentColor" stroke-width="1.3"/></svg>';
      document.querySelectorAll('.fa_like_div').forEach(function (div) {
        var likeBtn = div.querySelector('.fa_like');
        var dislikeBtn = div.querySelector('.fa_dislike');
        if (likeBtn && !likeBtn.querySelector('svg')) {
          likeBtn.insertAdjacentHTML('afterbegin', SVG_LIKE);
        }
        if (dislikeBtn && !dislikeBtn.querySelector('svg')) {
          dislikeBtn.insertAdjacentHTML('afterbegin', SVG_DISLIKE);
        }
      });

      /* Avatar du membre connecté dans la zone de réponse rapide */
      var qr = document.getElementById('quick_reply');
      if (qr && typeof _userdata !== 'undefined' && _userdata['session_logged_in'] && _userdata['avatar_link']) {
        var sceditorBox = qr.querySelector('.sceditor-container') || qr.querySelector('textarea');
        if (sceditorBox && !qr.querySelector('.sel-qr-avatar')) {
          var avatarBox = document.createElement('div');
          avatarBox.className = 'sel-qr-avatar';
          var avatarImg = document.createElement('img');
          avatarImg.src = _userdata['avatar_link'];
          avatarImg.alt = '';
          avatarImg.loading = 'lazy';
          avatarBox.appendChild(avatarImg);
          sceditorBox.parentNode.insertBefore(avatarBox, sceditorBox);
        }
      }

      /* Compteur de mots */
      if (qr) {
        var textarea = qr.querySelector('textarea[name="message"]') || qr.querySelector('textarea');
        if (textarea) {
          var counter = document.createElement('div');
          counter.className = 'sel-word-counter';
          var updateCounter = function () {
            var words = textarea.value.trim().split(/\s+/).filter(Boolean);
            counter.textContent = words.length + ' mot' + (words.length === 1 ? '' : 's');
          };
          textarea.addEventListener('input', updateCounter);
          updateCounter();
          qr.appendChild(counter);
        }
      }

      console.log('[selViewtopic] transform appliquee.');
    })();

    /* Pied de page du site (toutes les pages) : section "Nos partenaires"
       (grille vide pour l'instant, à remplir plus tard) + barre des liens
       légaux FA (© phpBB, Forum gratuit d'entraide, Statistiques, Contact,
       Signaler un abus, Cookies...). Ces liens sont injectés en HTML brut
       (liens, <br>, "|") directement dans <body>, sans conteneur, juste
       après le commentaire "overall_footer_begin" : on les récupère pour
       les ranger dans une seule barre propre. */
    (function selBuildSiteFooter() {
      var bodyNodes = Array.prototype.slice.call(document.body.childNodes);
      var footerStart = bodyNodes.findIndex(function (n) {
        return n.nodeType === Node.COMMENT_NODE && /overall_footer_begin/i.test(n.textContent || '');
      });
      if (footerStart === -1) { return; }

      var legalBar = document.createElement('div');
      legalBar.className = 'site-footer-bar forum-width';
      var legalLinks = [];
      for (var fi = footerStart + 1; fi < bodyNodes.length; fi++) {
        var fn = bodyNodes[fi];
        if (fn.nodeName === 'A' || fn.nodeName === 'STRONG' || (fn.nodeName === 'SPAN' && fn.classList.contains('gensmall'))) {
          fn.style.order = '';
          legalLinks.push(fn);
        } else if (fn.nodeName === 'SCRIPT' || fn.nodeName === 'IFRAME' || fn.nodeName === 'DIV') {
          break;
        } else {
          fn.remove();
        }
      }
      legalLinks.forEach(function (el, idx) {
        if (idx > 0) { legalBar.appendChild(document.createTextNode(' | ')); }
        legalBar.appendChild(el);
      });
      if (!legalBar.childNodes.length) { return; }

      var footer = document.createElement('footer');
      footer.className = 'site-footer forum-width';

      var partners = document.createElement('div');
      partners.className = 'site-footer-partners';
      var partnersTitle = document.createElement('h3');
      partnersTitle.className = 'site-footer-partners-title';
      partnersTitle.textContent = 'Nos partenaires';
      var partnersGrid = document.createElement('div');
      partnersGrid.className = 'site-footer-partners-grid';
      /* PLACEHOLDER temporaire (image générique) pour visualiser la place
         prise par la grille avant d'avoir les vrais logos partenaires.
         Remplacer chaque src par le logo réel, et ajuster le nombre de
         carrés selon le nombre de partenariats. */
      var partnerPlaceholderSrc = 'https://2img.net/i.imgur.com/21QSwFx.png';
      for (var pi = 0; pi < 8; pi++) {
        var partnerLink = document.createElement('a');
        partnerLink.className = 'partner-square';
        partnerLink.href = '#';
        var partnerImg = document.createElement('img');
        partnerImg.src = partnerPlaceholderSrc;
        partnerImg.alt = 'Partenaire';
        partnerImg.loading = 'lazy';
        partnerLink.appendChild(partnerImg);
        partnersGrid.appendChild(partnerLink);
      }
      partners.appendChild(partnersTitle);
      partners.appendChild(partnersGrid);

      footer.appendChild(partners);
      footer.appendChild(legalBar);
      document.body.appendChild(footer);
      footer.style.order = 9999;
    })();

    /* Avatar manquant dans le cadre "dernier message" des sous-forums :
       FA ne génère pas l'image ici (contrairement à la page d'accueil),
       seul un lien vers le profil de l'auteur est présent. On va chercher
       l'avatar sur la page de profil (.mod-login-avatar img) et on
       l'insère dans .lm-right, dans le même habillage que .lm-avatar-clip. */
    (function selFillMissingLastpostAvatars() {
      /* Certains widgets (boîtes "derniers messages" de la page d'accueil)
         chargent leur propre avatar en différé après le rendu initial. On
         attend un court instant avant d'agir, pour ne pas créer de doublon
         si FA finit par insérer le sien entre-temps. */
      setTimeout(function () {
        document.querySelectorAll('.lm-right').forEach(function (lmRight) {
          if (lmRight.dataset.avatarChecked || lmRight.querySelector('.lm-avatar-clip')) { return; }
          lmRight.dataset.avatarChecked = '1';
          var lmBody = lmRight.previousElementSibling;
          if (!lmBody || !lmBody.classList.contains('lm-body')) { return; }
          var authorLink = lmBody.querySelector('.lm-author a[href^="/u"]');
          if (!authorLink) { return; }
          fetch(authorLink.getAttribute('href'))
            .then(function (res) { return res.text(); })
            .then(function (html) {
              if (lmRight.querySelector('.lm-avatar-clip')) { return; }
              var avatarImg = new DOMParser().parseFromString(html, 'text/html').querySelector('.mod-login-avatar img');
              if (!avatarImg) { return; }
              var clip = document.createElement('div');
              clip.className = 'lm-avatar-clip';
              var img = document.createElement('img');
              img.src = avatarImg.getAttribute('src');
              img.alt = avatarImg.getAttribute('alt') || '';
              img.loading = 'lazy';
              clip.appendChild(img);
              lmRight.insertBefore(clip, lmRight.firstChild);
            })
            .catch(function () { /* avatar introuvable, on ignore */ });
        });
      }, 1500);
    })();
  </script>

  <script>Notiffi.init();</script>
